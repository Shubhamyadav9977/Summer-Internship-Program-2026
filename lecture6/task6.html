<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva UI Clone</title>
    <link rel="stylesheet" href="task6.css">
</head>
<body>

    <!-- Top Navbar -->
    <header>
        <div class="logo">Canva</div>

        <div class="nav-center">
            <button>File</button>
            <button>Resize</button>
            <button>Editing</button>
        </div>

        <div class="nav-right">
            <button class="present">Present</button>
            <button class="share">Share</button>
        </div>
    </header>

    <div class="main">

        <!-- Sidebar -->
        <aside class="sidebar">
            <h3>Templates</h3>
            <h3>Elements</h3>
            <h3>Text</h3>
            <h3>Uploads</h3>
            <h3>Projects</h3>
            <h3>Apps</h3>
            <h3>Audio</h3>
        </aside>

        <!-- Left Content -->
        <section class="left-panel">

            <input type="text"
                placeholder="Describe your ideal design">

            <div class="buttons">
                <button>Generate</button>
                <button>Search</button>
            </div>

            <h2>Recently Used</h2>

            <div class="templates">

                <div class="card">
                  <image src="images.jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(1).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(2).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(3).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(4).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(5).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(6).jpeg" ></image>
                </div>
                <div class="card">
                  <image src="images(7).jpeg" ></image>
                </div>

            </div>

        </section>

        <!-- Canvas -->
        <section class="canvas-section">

            <div class="toolbar">
                <button>Edit</button>
                <button>Effects</button>
                <button>Animate</button>
                <button>Position</button>
            </div>

            <div class="canvas">

                <div class="circle"></div>
                <div class="square"></div>
                <div class="triangle"></div>
                <div class="pentagon"></div>

                <div class="plus">
                    <div class="v"></div>
                    <div class="h"></div>
                </div>

                <div class="parallelogram"></div>

                <div class="arrow"></div>

                <div class="heart"></div>

            </div>

            <div class="pages">

                <div class="page-thumb"></div>
                <div class="add-page">+</div>

            </div>

        </section>

    </div>

</body>
</html>
